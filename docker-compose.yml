version: '3.8'

services:
  api:
    build: .
    container_name: salesiq-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/data/salesiq.db
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    container_name: salesiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
